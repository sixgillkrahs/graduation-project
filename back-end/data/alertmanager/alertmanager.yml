global:
  resolve_timeout: 5m

route:
  receiver: "web.hook"
  group_by:
    - alertname
    - job
    - instance
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h

receivers:
  - name: "web.hook"
    webhook_configs:
      - url: "http://api:8080/monitoring/alerts"
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal:
      - alertname
      - job
      - instance
